<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impact — Helping Hands</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <div class="logo-icon">🤝</div>
    <span>Helping Hands</span>
  </a>
  <ul class="nav-links" id="navLinks"></ul>
  <div class="hamburger" onclick="toggleNav()" id="hamburger">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="page-hero" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
  <h1>Our Impact 🌎</h1>
  <p>Transparency in action — seeing where your donations go</p>
</div>

<div style="max-width:1100px; margin: 40px auto; padding: 0 20px;">
  <div class="section-header">
    <h2>Success Stories</h2>
    <p>Every donation listed here represents a fulfilled promise to someone in our community.</p>
  </div>

  <div id="impactList" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:24px;">
    <!-- Loading state -->
    <div style="text-align:center; grid-column: 1/-1; padding: 40px; color:var(--text-muted);">
      <p>Loading the impact stories...</p>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', fetchImpact);

async function fetchImpact() {
  const list = document.getElementById('impactList');
  try {
    const response = await fetch('../../backend/api/admin/manage_impact.php?action=list');
    const result = await response.json();
    
    if (result.success && result.data.length > 0) {
      list.innerHTML = result.data.map(item => `
        <div class="dash-card" style="text-align:left; padding:0; overflow:hidden; border-radius:24px; transition: transform 0.3s ease; border: 1px solid var(--border);">
          <div style="height:250px; background: ${item.proof_image ? `url('../../backend/uploads/${item.proof_image}')` : 'var(--primary-light)'} center/cover; position:relative;">
             ${!item.proof_image ? `<div style="display:flex; align-items:center; justify-content:center; height:100%; font-size:4.5rem;">🎒</div>` : ''}
             <div style="position:absolute; bottom:0; left:0; width:100%; height:50%; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);"></div>
             <div style="position:absolute; bottom:16px; left:20px; color:white; font-size:0.85rem; font-weight:600;">
               ✨ Verified Proof
             </div>
          </div>
          <div style="padding:24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <span style="background:var(--primary-light); color:var(--primary); padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">Fulfillment</span>
              <span style="color:var(--text-muted); font-size:0.8rem; font-weight:500;">📅 ${new Date(item.distributed_at).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })}</span>
            </div>
            <h3 style="margin-bottom:12px; font-size:1.25rem; font-family:'Playfair Display',serif; color:var(--secondary);">Providing ${item.product_name}</h3>
            <p style="font-size:0.92rem; line-height:1.7; color:var(--text-muted); margin-bottom:16px;">
              Successfully delivered to <strong>${item.receiver_name}</strong>. ${item.notes || 'Helping families get the resources they need for a better tomorrow.'}
            </p>
            <div style="border-top:1px solid var(--border); padding-top:16px; display:flex; align-items:center; justify-content:space-between;">
              <span style="font-size:0.75rem; color:var(--text-emerald); font-weight:700;">✓ MISSION ACCOMPLISHED</span>
              <span style="font-size:1.2rem;">🤝</span>
            </div>
          </div>
        </div>
      `).join('');
    } else {
      list.innerHTML = `
        <div style="text-align:center; grid-column: 1/-1; padding: 100px 20px; background: white; border-radius: 30px; box-shadow: var(--shadow);">
          <div style="font-size:4rem; margin-bottom:24px; animation: pulse 2s infinite;">🌱</div>
          <h2 style="font-family:'Playfair Display',serif; margin-bottom:12px;">Sowing the Seeds of Impact</h2>
          <p style="color:var(--text-muted); max-width:500px; margin:0 auto; line-height:1.6;">Our first success stories are being carefully documented with verified proof. Check back very soon to see the difference your donations are making!</p>
        </div>
      `;
    }
  } catch (err) {
    console.error(err);
    list.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Connection issue. Unable to fetch our impact gallery at this moment.</p>';
  }
}
</script>
</body>
</html>
